<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja - Designed by Druv Cheris Jhurry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="contenitore-gioco">
    <div id="hud" class="nascosto">
        <div id="valore-punteggio-container">
            Punteggio: <span id="valore-punteggio">0</span>
            <span id="indicatore-modalita"></span>
        </div>
        <div id="hud-vite">Vite: <span id="valore-vite">❤️❤️❤️</span></div>
    </div>
    
    <canvas id="tela"></canvas>

    <div id="menu-principale" class="schermata">
        <h1>Fruit Ninja</h1>
        
        <div class="contenitore-record">
            <p class="testo-punteggio">Record: <span id="record-normale">0</span></p>
            <p class="testo-punteggio testo-estrema">Record Estrema: <span id="record-estrema">0</span></p>
        </div>
        
        <div class="contenitore-bottoni">
            <button class="bottone-figo" id="btn-gioca">Gioca</button>
            <button class="bottone-figo bottone-estrema" id="btn-estrema">Estrema ☠️</button>
            <button class="bottone-figo bottone-secondario" id="btn-reset">Reset Record</button>
        </div>
        
        <div class="footer">Designed by Druv Cheris Jhurry</div>
    </div>

    <div id="menu-gameover" class="schermata nascosto">
        <h2 id="titolo-gameover">Game Over!</h2>
        <p class="testo-punteggio" style="margin-bottom: 20px;">Hai affettato <span id="punteggio-finale">0</span> frutti!</p>
        <div class="contenitore-bottoni">
            <button class="bottone-figo" id="btn-riprova">Riprova</button>
            <button class="bottone-figo bottone-secondario" id="btn-home">Menu</button>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
